name: PR Title

# Validates pull request titles follow Conventional Commits.
# Release Please derives the changelog and version bump from squash-merged
# PR titles (or commit messages on merge commits), so an invalid title would
# silently produce a wrong release. This workflow catches that early.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate title is Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z].+[^.]$
          subjectPatternError: |
            The PR title subject must start with a letter and not end with a period.
          wip: true
