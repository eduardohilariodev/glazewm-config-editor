name: Release

# Triggered when release-please creates a draft release after merging its PR.
# The build matrix uploads all platform assets; publish-release then makes it live,
# which in turn fires the scoop-bucket-update workflow.

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release ID to upload assets to (for manual reruns)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}${{ matrix.args != '' && format(' {0}', matrix.args) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install JS dependencies
        run: deno install

      - name: Import Apple certificate to keychain
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            echo "$APPLE_CERTIFICATE" | base64 -D > "$RUNNER_TEMP/certificate.p12"
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$RUNNER_TEMP/certificate.p12" \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"
            security set-key-partition-list \
              -S apple-tool:,apple: \
              -s -k "$KEYCHAIN_PASSWORD" \
              "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
          fi

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing — leave secrets empty for ad-hoc (Gatekeeper override required)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ github.event.release.id || inputs.release_id }}
          updaterJsonPreferNsis: ${{ matrix.platform == 'windows-latest' }}
          args: ${{ matrix.args }}
          tauriScript: deno task tauri

      - name: Create and upload portable zip
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.release.id || inputs.release_id }}
          REPO: ${{ github.repository }}
        shell: pwsh
        run: |
          # Resolve tag name from the release ID so gh can find the release.
          $tag = gh api /repos/$env:REPO/releases/$env:RELEASE_ID --jq '.tag_name'
          $zipName = "glazewm-editor-$tag-x64-portable.zip"
          Compress-Archive -Path "src-tauri\target\release\glazewm-editor.exe" `
            -DestinationPath $zipName -Force
          gh release upload $tag $zipName --clobber


  publish-release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = context.payload.release?.id ?? Number(context.payload.inputs.release_id);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            })

