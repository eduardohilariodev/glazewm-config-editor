version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
      prod-dependencies:
        dependency-type: production
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope
