name: Feature request
description: Suggest a new feature or enhancement.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem first, then the solution
        you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user-facing problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you rejected them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or related issues.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
