name: Bug report
description: Report a defect in GlazeWM Config Editor.
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the fields below
        so we can reproduce and triage the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reproduce the problem.
      placeholder: |
        1. Open the app
        2. Click ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: GlazeWM Config Editor version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: Windows version
      description: Run `winver` and paste the version/build number.
      placeholder: e.g. Windows 11 23H2 (22631.4317)
    validations:
      required: true

  - type: input
    id: glazewm-version
    attributes:
      label: GlazeWM version
      placeholder: e.g. 3.5.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant logs, stack traces, or error dialogs.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest released version.
          required: true
